version: 2
updates:
  # Enable version updates for Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    reviewers:
      - "FunKite"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Slow routine version PRs slightly so security PRs do not race them,
    # and group each update class to reduce PR noise.
    groups:
      rust-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      rust-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 3
    reviewers:
      - "FunKite"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Consolidate routine Actions bumps so maintenance work happens in a
    # single refresh branch when main has moved or a security fix is needed.
    groups:
      github-actions-version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
